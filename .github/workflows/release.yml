name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---- Bundle native sidecars per platform ----
      # Tauri sidecars are looked up by `name-<rust-triple>` (no extension on
      # Mac/Linux, .exe on Windows). They MUST be in src-tauri/binaries/ before
      # `tauri build` runs so they get embedded in the app bundle/installer.
      #
      # Mac aarch64 already has ffmpeg + perl-based exiftool committed to the
      # repo. We download what's missing per-platform here.

      - name: Download Mac x86_64 ffmpeg
        if: matrix.platform == 'macos-latest' && contains(matrix.args, 'x86_64-apple-darwin')
        run: |
          # evermeet.cx serves the canonical Intel-only mac ffmpeg.
          # Returns a 302 to the latest stable build.
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip"
          unzip ffmpeg.zip
          mv ffmpeg src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-x86_64-apple-darwin

      - name: Download Windows ffmpeg + exiftool + libheif
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -e
          mkdir -p src-tauri/binaries
          # ffmpeg (gyan.dev essentials build)
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ffmpeg.zip -offmpeg-extract
          cp ffmpeg-extract/ffmpeg-*/bin/ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          # exiftool standalone Windows (.exe). Newer zips ship as
          # exiftool-<ver>_64/exiftool(-k).exe with an exiftool_files/ sibling
          # the exe needs at runtime — copy both.
          curl -L -o exiftool.zip https://exiftool.org/exiftool-13.57_64.zip
          7z x exiftool.zip -oexiftool-extract
          EXIFTOOL_EXE=$(find exiftool-extract -name "exiftool(-k).exe" -type f | head -1)
          if [ -z "$EXIFTOOL_EXE" ]; then
            echo "Could not locate exiftool(-k).exe in extracted zip"; ls -R exiftool-extract; exit 1
          fi
          EXIFTOOL_DIR=$(dirname "$EXIFTOOL_EXE")
          if [ -d "$EXIFTOOL_DIR/exiftool_files" ]; then
            cp -r "$EXIFTOOL_DIR/exiftool_files" src-tauri/exiftool/
          fi
          cp "$EXIFTOOL_EXE" src-tauri/exiftool/exiftool.exe
          # libheif heif-enc.exe for Windows HEIC encoding (Mac uses sips).
          # strukturag doesn't ship Windows binaries; use MSYS2 (preinstalled
          # on windows-latest) to pull a prebuilt mingw libheif. heif-enc.exe
          # runs as its own process, so the mingw runtime doesn't conflict
          # with our MSVC-built tauri app.
          /c/msys64/usr/bin/pacman.exe -Sy --noconfirm --needed mingw-w64-x86_64-libheif
          cp /c/msys64/mingw64/bin/heif-enc.exe src-tauri/binaries/heif-enc-x86_64-pc-windows-msvc.exe
          # Copy the runtime DLLs heif-enc.exe needs. Glob broadly — pacman
          # can pull in slightly different sets across versions.
          for dll in libheif libde265 libx265 libaom libdav1d libsharpyuv \
                     libjpeg libpng16 libwebp libtiff libopenh264 libsvtav1enc \
                     libwinpthread libgcc_s libstdc \
                     zlib1; do
            cp /c/msys64/mingw64/bin/${dll}*.dll src-tauri/binaries/ 2>/dev/null || true
          done

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Snap Caption Studio ${{ github.ref_name }}'
          releaseBody: 'See assets below.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
