name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Run one platform at a time. The "main" release is shared across all
      # matrix jobs and tauri-action's "delete asset → re-upload → patch
      # latest.json" sequence races when jobs publish in parallel — that's
      # what corrupted v4.0.1's Mac aarch64 signature. ~14 min total vs 10
      # min parallel, but it's the difference between "auto-updater works"
      # and "auto-updater silently breaks for half the users."
      max-parallel: 1
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---- Bundle native sidecars per platform ----
      # Tauri sidecars are looked up by `name-<rust-triple>` (no extension on
      # Mac/Linux, .exe on Windows). They MUST be in src-tauri/binaries/ before
      # `tauri build` runs so they get embedded in the app bundle/installer.
      #
      # Mac aarch64 already has ffmpeg + perl-based exiftool committed to the
      # repo. We download what's missing per-platform here.

      - name: Download Windows ffmpeg + exiftool + libheif
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -e
          mkdir -p src-tauri/binaries
          # ffmpeg (gyan.dev essentials build)
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ffmpeg.zip -offmpeg-extract
          cp ffmpeg-extract/ffmpeg-*/bin/ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          # exiftool standalone Windows (.exe). Newer zips ship as
          # exiftool-<ver>_64/exiftool(-k).exe with an exiftool_files/ sibling
          # the exe needs at runtime — copy both.
          curl -L -o exiftool.zip https://exiftool.org/exiftool-13.57_64.zip
          7z x exiftool.zip -oexiftool-extract
          EXIFTOOL_EXE=$(find exiftool-extract -name "exiftool(-k).exe" -type f | head -1)
          if [ -z "$EXIFTOOL_EXE" ]; then
            echo "Could not locate exiftool(-k).exe in extracted zip"; ls -R exiftool-extract; exit 1
          fi
          EXIFTOOL_DIR=$(dirname "$EXIFTOOL_EXE")
          if [ -d "$EXIFTOOL_DIR/exiftool_files" ]; then
            cp -r "$EXIFTOOL_DIR/exiftool_files" src-tauri/exiftool/
          fi
          cp "$EXIFTOOL_EXE" src-tauri/exiftool/exiftool.exe
          # libheif heif-enc.exe for Windows HEIC encoding (Mac uses sips).
          # strukturag doesn't ship Windows binaries; use MSYS2 (preinstalled
          # on windows-latest) to pull a prebuilt mingw libheif. heif-enc.exe
          # runs as its own process, so the mingw runtime doesn't conflict
          # with our MSVC-built tauri app.
          # Install libheif AND ntldd. ntldd is the Windows equivalent of ldd
          # — given an .exe/.dll, it lists all transitive DLL deps with their
          # resolved paths. v4.0.4's hand-rolled bash recursion via objdump
          # silently produced 1 result on the runner; v4.0.5's pacman call
          # exited 1 (post-transaction hook quirk in the runner's MSYS2 env)
          # which killed the script before bundling. Use `|| true` so we
          # tolerate that, then verify the binaries we need actually exist.
          /c/msys64/usr/bin/pacman.exe -Sy --noconfirm --needed mingw-w64-x86_64-libheif mingw-w64-x86_64-ntldd-git || true
          test -f /c/msys64/mingw64/bin/heif-enc.exe || { echo "heif-enc.exe not installed by pacman"; exit 1; }
          test -f /c/msys64/mingw64/bin/ntldd.exe    || { echo "ntldd.exe not installed by pacman"; exit 1; }
          # libheif 1.21+ renamed heif-convert → heif-dec. Try both names so
          # we work across mingw64 versions; the sidecar always lands as
          # heif-convert-<triple>.exe so the Rust side uses one canonical name.
          HEIF_DECODER=""
          for cand in heif-convert heif-dec; do
            if [ -f "/c/msys64/mingw64/bin/${cand}.exe" ]; then HEIF_DECODER="$cand"; break; fi
          done
          if [ -z "$HEIF_DECODER" ]; then
            echo "No heif decoder tool found in mingw64/bin. Available heif-* binaries:"
            ls /c/msys64/mingw64/bin/heif* 2>&1 || true
            exit 1
          fi
          echo "Using $HEIF_DECODER as the HEIC decoder sidecar"
          cp /c/msys64/mingw64/bin/heif-enc.exe        src-tauri/binaries/heif-enc-x86_64-pc-windows-msvc.exe
          cp "/c/msys64/mingw64/bin/${HEIF_DECODER}.exe" src-tauri/binaries/heif-convert-x86_64-pc-windows-msvc.exe
          # Recursively list every DLL each tool depends on. ntldd outputs
          # Windows-style paths (C:\msys64\mingw64\bin\…) — extract basename
          # and copy from the known bin dir. Walk BOTH heif-enc and
          # heif-convert so we cover everything libheif's CLI tools touch
          # (overlap is fine — sort -u dedupes).
          echo "--- ntldd raw output (heif-enc) ---"
          /c/msys64/mingw64/bin/ntldd.exe -R src-tauri/binaries/heif-enc-x86_64-pc-windows-msvc.exe 2>&1 | head -50
          echo "--- ntldd raw output (heif-convert) ---"
          /c/msys64/mingw64/bin/ntldd.exe -R src-tauri/binaries/heif-convert-x86_64-pc-windows-msvc.exe 2>&1 | head -50
          echo "---------------------------------------"
          set +e
          {
            /c/msys64/mingw64/bin/ntldd.exe -R src-tauri/binaries/heif-enc-x86_64-pc-windows-msvc.exe 2>&1
            /c/msys64/mingw64/bin/ntldd.exe -R src-tauri/binaries/heif-convert-x86_64-pc-windows-msvc.exe 2>&1
          } | awk 'tolower($0) ~ /msys64/ {print $1}' \
            | sort -u \
            | while read dll; do
                src="/c/msys64/mingw64/bin/$dll"
                if [ -f "$src" ]; then cp "$src" src-tauri/binaries/; fi
              done
          set -e
          echo "Bundled $(ls -1 src-tauri/binaries/*.dll 2>/dev/null | wc -l) DLL(s) for heif-enc:"
          ls -1 src-tauri/binaries/*.dll 2>/dev/null | head -50 || echo "(none — DLL bundling failed)"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Snap Caption Studio ${{ github.ref_name }}'
          releaseBody: 'See assets below.'
          # KEEP THE RELEASE AS A DRAFT until publish-latest-json finishes.
          # GitHub promotes any non-draft release to "latest" the moment it's
          # created — and tauri-action creates it at the START of the matrix.
          # That left a ~14-minute window where /releases/latest/download/
          # latest.json returned 404 because v<new>'s latest.json hadn't been
          # uploaded yet. Drafts are excluded from "latest" by GitHub, so the
          # updater stays on the previous good release until we explicitly
          # un-draft this one in publish-latest-json.
          releaseDraft: true
          prerelease: false
          # We write latest.json ourselves in the publish-latest-json job
          # below — tauri-action's "Signature not found" bug silently skipped
          # the latest.json update for v4.1.0/4.1.1/4.1.2 leaving auto-updates
          # broken. Set to false here so it doesn't try and fail.
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  # ============================================================
  # Build latest.json from the actually-uploaded .sig files. Runs ONCE
  # after the matrix completes, regardless of pass/fail per platform —
  # if a platform failed, we skip its entry instead of breaking the
  # whole updater. Replaces tauri-action's broken updater-json logic.
  # ============================================================
  publish-latest-json:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Determine version
        id: ver
        run: |
          VER=$(grep -m1 '"version"' src-tauri/tauri.conf.json | sed -E 's/.*"version": *"([^"]+)".*/\1/')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"
      - name: Build + upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VER="${{ steps.ver.outputs.version }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          DIR=$(mktemp -d)

          # Pull each platform's .sig from the release. Names match what
          # tauri-action uploads (mac is unversioned, Windows is versioned).
          MAC_SIG="$DIR/Snap.Caption.Studio_aarch64.app.tar.gz.sig"
          WIN_MSI_SIG="$DIR/Snap.Caption.Studio_${VER}_x64_en-US.msi.sig"
          WIN_NSIS_SIG="$DIR/Snap.Caption.Studio_${VER}_x64-setup.exe.sig"

          # `gh release download` exits non-zero if a file is missing,
          # which is fine for individual platforms — we want to know.
          # Use || true so the absence of one platform doesn't kill the
          # script before we check the others.
          gh release download "$TAG" -R "$REPO" -D "$DIR" \
            -p "Snap.Caption.Studio_aarch64.app.tar.gz.sig" --clobber 2>/dev/null || true
          gh release download "$TAG" -R "$REPO" -D "$DIR" \
            -p "Snap.Caption.Studio_${VER}_x64_en-US.msi.sig" --clobber 2>/dev/null || true
          gh release download "$TAG" -R "$REPO" -D "$DIR" \
            -p "Snap.Caption.Studio_${VER}_x64-setup.exe.sig" --clobber 2>/dev/null || true

          python3 <<EOF > "$DIR/latest.json"
          import json, datetime, pathlib, os
          plats = {}
          mac = pathlib.Path(r"$MAC_SIG")
          if mac.exists():
              sig = mac.read_text().strip()
              plats["darwin-aarch64"]     = {"signature": sig, "url": f"$BASE/Snap.Caption.Studio_aarch64.app.tar.gz"}
              plats["darwin-aarch64-app"] = {"signature": sig, "url": f"$BASE/Snap.Caption.Studio_aarch64.app.tar.gz"}
          wmsi = pathlib.Path(r"$WIN_MSI_SIG")
          if wmsi.exists():
              sig = wmsi.read_text().strip()
              plats["windows-x86_64"]     = {"signature": sig, "url": f"$BASE/Snap.Caption.Studio_${VER}_x64_en-US.msi"}
              plats["windows-x86_64-msi"] = {"signature": sig, "url": f"$BASE/Snap.Caption.Studio_${VER}_x64_en-US.msi"}
          wnsis = pathlib.Path(r"$WIN_NSIS_SIG")
          if wnsis.exists():
              sig = wnsis.read_text().strip()
              plats["windows-x86_64-nsis"] = {"signature": sig, "url": f"$BASE/Snap.Caption.Studio_${VER}_x64-setup.exe"}
          if not plats:
              print(json.dumps({"error": "no platforms had signatures — aborting"}))
              exit(1)
          data = {
              "version":  "$VER",
              "notes":    "See assets below.",
              "pub_date": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.000Z"),
              "platforms": plats,
          }
          print(json.dumps(data, indent=2))
          EOF

          echo "--- latest.json content ---"
          cat "$DIR/latest.json"
          echo "---------------------------"

          gh release upload "$TAG" "$DIR/latest.json" -R "$REPO" --clobber
          echo "✓ latest.json uploaded for v${VER}"

          # Now that latest.json + all binaries are in place, flip the release
          # from draft to public. GitHub will then promote it to "latest" and
          # the auto-updater can fetch /releases/latest/download/latest.json
          # without race-conditioning a 404. If this script fails before this
          # line — partial uploads, signature missing, etc. — the release
          # stays a draft and the updater keeps pointing at the previous good
          # release. That's the desired failure mode.
          gh release edit "$TAG" -R "$REPO" --draft=false
          echo "✓ release v${VER} promoted from draft to public"
